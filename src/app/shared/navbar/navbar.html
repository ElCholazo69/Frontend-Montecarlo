<header>
  <nav>
    <div class="logo">
      <img src="image/logo.png" alt="logo del Club Deportivo Montecarlo">
      <h2>RESERVA TU CANCHA</h2>
    </div>

    <div class="menu" (click)="toggleMenu()">
      ☰
    </div>

    <ul class="links" [class.activo]="menuAbierto">
      <li><a routerLink="/">Inicio</a></li>
      <li><a routerLink="/canchas">Canchas</a></li>
      <li><a routerLink="/reservas">Reservas</a></li>
      <li><a routerLink="/consultas">Consultas</a></li>

      @if (estaLogueado()) {
        <li><a (click)="salir()" class="link-salir">Cerrar Sesión</a></li>
      } @else{
        <li><a routerLink="/login">Login</a></li>
      }
    </ul>
  </nav>
</header>
